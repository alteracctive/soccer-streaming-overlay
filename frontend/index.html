<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control Panel</title>
    <link rel="stylesheet" href="./control_panel/control-panel.css" />
  </head>
  <body>
    <div class="control-panel-container">
      <nav class="sidebar">
        <h3>Control Panel</h3>
        
        <div class="server-status-container">
          <span>Server Status</span>
          <div id="status-indicator" class="disconnected" title="Disconnected"></div>
        </div>
        <div class="overlay-link-container">
          <a href="http://localhost:8001/overlay/index.html" target="_blank" title="Open overlay in new tab">
            🔗 Overlay Link
          </a>
          <button id="copy-overlay-link" title="Copy URL to clipboard">
            Copy
          </button>
        </div>
        
        <div class="mini-scoreboard">
          <div class="mini-score-row">
            <div class="team-color-strip" id="mini-strip-a">
              <div id="mini-strip-a-primary"></div>
              <div id="mini-strip-a-secondary"></div>
            </div>
            <button id="mini-score-a" class="mini-score-btn" title="Add 1 Goal">00</button>
            <span class="dash">-</span>
            <button id="mini-score-b" class="mini-score-btn" title="Add 1 Goal">00</button>
            
            <div class="team-color-strip" id="mini-strip-b">
              <div id="mini-strip-b-primary"></div>
              <div id="mini-strip-b-secondary"></div>
            </div>
          </div>
          <div class="mini-timer-row">
            <button id="mini-timer-btn" class="mini-timer-btn" title="Click to Play/Pause">00:00</button>
          </div>
        </div>
        
        <div class="search-container">
          <input type="text" id="sidebar-search-input" placeholder="Search pages..." autocomplete="off">
          <div id="sidebar-search-suggestions" class="search-suggestions hidden"></div>
        </div>
        
        <ul>
          <li>
            <a href="#" class="nav-link active" data-page="dashboard"
              >📊 Dashboard</a
            >
          </li>
          <li>
            <a href="#" class="nav-link" data-page="broadcast"
              >📡 Broadcast</a
            >
          </li>
          <li>
            <a href="#" class="nav-link" data-page="details"
              >📋 Match Details</a
            >
          </li>
          <li>
            <a href="#" class="nav-link" data-page="customization"
              >🎨 Customization</a
            >
          </li>
          <li>
            <a href="#" class="nav-link" data-page="layout"
              >📐 Layout</a
            >
          </li>
          <li>
            <a href="#" class="nav-link" data-page="team-info"
              >⚽ Team Info</a
            >
          </li>
          <li>
            <a href="#" class="nav-link" data-page="setting">⚙️ Setting</a>
          </li>
          <li>
            <a href="#" class="nav-link" data-page="shortcuts">⌨️ Shortcuts</a>
          </li>
        </ul>
      </nav>

      <main class="subpage-content" id="app-content"></main>
    </div>
    <script type="module" src="./control_panel/main.ts"></script>
  </body>
</html>
